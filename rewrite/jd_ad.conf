# 京东去广告配置
# 仓库: Hello-QuantumultX

hostname = api.m.jd.com, ad.m.jd.com, dns.jd.com

# [脚本规则] 动态净化开屏和弹窗
^https?:\/\/api\.m\.jd\.com\/client\.action\?functionId=(startUpAd|getAdvertising|zoom|popupControl) url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/jd_purify.js

# [静态规则] 屏蔽广告分发和测速
^https?:\/\/ad\.m\.jd\.com\/ url reject-200
^https?:\/\/dns\.jd\.com\/ url reject-200
