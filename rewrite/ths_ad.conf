# 同花顺（10jqka）去广告配置
# 仓库: Hello-QuantumultX
# 路径: /rewrite/ths_ad.conf
#
# 本配置基于 2026-07-15 真实抓包（199 个请求）分析得出，规则均命中实际广告接口。
# 结论：同花顺广告走「独立广告接口 + 广告图片」，不混在正文 JSON 里，
#      因此以「静态拦截」为主，脚本仅用于消息推送中心的营销过滤。
#
# 使用：QuantumultX -> 重写 -> 引用本文件 raw 链接，开启 MITM 并信任证书
# https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/rewrite/ths_ad.conf

hostname = adm.10jqka.com.cn, s.thsi.cn, ad.thsi.cn, cbasspider.10jqka.com.cn, apm.hexin.cn, mobile.10jqka.com.cn, *.10jqka.com.cn

# ========== 一、核心广告接口（抓包实锤，直接拦截） ==========

# 广告推荐接口（抓包中被反复请求 11 次，返回广告物料）
^https?:\/\/adm\.10jqka\.com\.cn\/interface\/ad\/recommend url reject-dict

# 广告图片（adpic 目录，实锤为开屏/横幅广告图）
^https?:\/\/s\.thsi\.cn\/js\/m\/upload\/adpic\/ url reject-img

# 独立广告域名（开户/券商推广等）
^https?:\/\/ad\.thsi\.cn\/ url reject-img

# ========== 二、行为追踪 / 遥测上报（可选，拦截更省电省流量） ==========

# 用户行为埋点上报（cbas spider，仅上报不影响功能）
^https?:\/\/cbasspider\.10jqka\.com\.cn\/spider\/api\/v1\/report\/ url reject-200

# 崩溃/错误日志上报
^https?:\/\/apm\.hexin\.cn\/apm\/v1\/error_log url reject-200

# ========== 三、通用兜底（推测规则，覆盖未抓到的开屏/弹窗接口） ==========

# 开屏广告配置（旧版路径，保留兜底）
^https?:\/\/.*\.10jqka\.com\.cn\/adapi\/post\/config url reject-200

# 首页弹窗广告（旧版路径，保留兜底）
^https?:\/\/mobile\.10jqka\.com\.cn\/main\/get_ads url reject-dict

# 其它专用广告子域（adx/ads/adv 等）
^https?:\/\/(ads?|adm|adx|adv)\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/ url reject-200

# ========== 四、脚本净化：消息推送中心营销过滤 ==========
# （抓包未见正文流内嵌广告，故脚本只作用于消息中心，按营销关键词剔除推送）

^https?:\/\/.*\.10jqka\.com\.cn\/(msg|notice|push)\/.*\/list url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# ========== 复核说明 ==========
# 若开屏/弹窗仍有残留：再抓一次包，把对应 URL 发来即可精准补规则。
# 脚本对未知结构原样返回，不会破坏 App。
