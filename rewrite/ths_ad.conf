# 同花顺（10jqka）去广告配置
# 仓库: Hello-QuantumultX
# 路径: /rewrite/ths_ad.conf
#
# 设计原则：
#   1) 纯广告接口 -> 静态 reject，零开销、零误伤；
#   2) 广告与正文混在同一接口 -> 脚本只删「被结构标记为广告」的条目，不猜关键词；
#   3) 匹配尽量精准，避免 hook 到自选股/行情等正常接口。
#
# 使用：QuantumultX -> 重写 -> 引用本文件 raw 链接，开启 MITM 并信任证书
# https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/rewrite/ths_ad.conf
#
# 注意：同花顺广告接口无公开文档，以下路径为常见命名模式的合理推断。
#      建议用 QX 内置抓包核对真实 URL 后再收敛（见文末说明）。

hostname = *.10jqka.com.cn, *.hexin.cn, *.thsi.cn

# ========== 一、静态拦截：纯广告接口（推荐，安全无副作用） ==========

# 开屏广告配置下发
^https?:\/\/.*\.10jqka\.com\.cn\/adapi\/post\/config url reject-200

# 首页弹窗广告
^https?:\/\/mobile\.10jqka\.com\.cn\/main\/get_ads url reject-dict

# 专用广告域名 / 广告子系统（adx、adserver、adservice…）
^https?:\/\/(ad|ads|adm|adx|adv)\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/ url reject-200
^https?:\/\/.*\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/(adx|adserver|adservice|adsystem|advertisement)\/ url reject-200

# 三方广告联盟 SDK（穿山甲 csj、优量汇 gdt、快手…）上报/拉取
^https?:\/\/.*\.(10jqka\.com\.cn|hexin\.cn)\/.*\/(csj|gdt|pangolin|kuaishou|union_ad)\/ url reject-200

# ========== 二、脚本净化：广告与正文混排的接口（精准匹配） ==========

# 开屏 / 闪屏配置（返回体里含开屏物料，脚本清空广告字段而非整体拒绝，避免影响启动逻辑）
^https?:\/\/.*\.(10jqka\.com\.cn|thsi\.cn)\/.*(splash|kaiping|coldstart)\/(config|get|list) url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# 弹窗 / 运营浮层（同上，清空广告位而非整体拒绝）
^https?:\/\/.*\.10jqka\.com\.cn\/.*(popup|operate|marketing)\/(get|list|query) url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# 消息 / 通知推送中心（此处按营销关键词过滤是安全的：删的是推送短信而非行情内容）
^https?:\/\/.*\.10jqka\.com\.cn\/(msg|notice|push)\/.*\/list url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# ========== 抓包核对说明 ==========
# 若某条规则未生效或误伤：QX -> 抓包 -> 打开同花顺触发广告 -> 复制真实 URL，
# 替换上方对应正则即可。脚本对未知结构会原样返回，不会破坏 App。
