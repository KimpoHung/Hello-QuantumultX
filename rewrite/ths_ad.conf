# 同花顺（10jqka）去广告配置
# 仓库: Hello-QuantumultX
# 路径: /rewrite/ths_ad.conf
#
# 使用方法：QuantumultX -> 重写 -> 引用本文件 raw 链接，并确保 MITM 已开启且信任证书
# https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/rewrite/ths_ad.conf

hostname = *.10jqka.com.cn, *.hexin.cn, *.thsi.cn, *.hexin.com.cn

# ================= 脚本规则（动态净化，保留正常业务数据） =================

# [脚本] 开屏广告 / 启动闪屏
^https?:\/\/.*\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/.*(splash|kaiping|startup|start_up|launch|coldstart|open_ad).* url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# [脚本] 弹窗 / 浮层 / 运营活动弹层
^https?:\/\/.*\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/.*(popup|pop_up|float|window|dialog|operate|marketing|activity).* url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# [脚本] 信息流 / 资讯页 feed 广告
^https?:\/\/.*\.(10jqka\.com\.cn|thsi\.cn)\/.*(feed|flow|infoflow|recommend)\/.* url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# [脚本] 消息中心营销推送（理财、基金、抽奖等）
^https?:\/\/.*\.10jqka\.com\.cn\/(msg|notice|push)\/.*\/list url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/ths_purify.js

# ================= 静态规则（直接拦截，纯广告接口） =================

# [静态] 开屏广告配置下发
^https?:\/\/.*\.10jqka\.com\.cn\/adapi\/post\/config url reject-200

# [静态] 首页弹窗广告
^https?:\/\/mobile\.10jqka\.com\.cn\/main\/get_ads url reject-dict

# [静态] 广告物料 / 广告平台 / 商业化接口
^https?:\/\/.*\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/.*(adx|adserver|adsystem|adservice|adslot|advertisement)\/ url reject-200
^https?:\/\/(ad|ads|adm|adx|adv)\.(10jqka\.com\.cn|hexin\.cn|thsi\.cn)\/ url reject-200

# [静态] 三方广告联盟 SDK（穿山甲、优量汇、快手等）
^https?:\/\/.*\.10jqka\.com\.cn\/.*(gdt|csj|pangolin|kuaishou|union_ad|thirdad)\/ url reject-200
