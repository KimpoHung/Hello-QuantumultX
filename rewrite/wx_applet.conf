# 微信小程序去广告配置
# 仓库: Hello-QuantumultX

hostname = mp.weixin.qq.com, lp.open.weixin.qq.com

# 拦截小程序开屏广告下发
^https?:\/\/mp\.weixin\.qq\.com\/wxad\/getad url reject-200

# 拦截小程序插屏广告与激励视频配置
^https?:\/\/mp\.weixin\.qq\.com\/wxad\/view url reject-200

# 拦截小程序数据统计（减少追踪）
^https?:\/\/lp\.open\.weixin\.qq\.com\/monitor\/report url reject-200
