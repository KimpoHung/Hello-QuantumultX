# 金十数据（jin10）去广告配置
# 仓库: Hello-QuantumultX
# 路径: /rewrite/jin10_ad.conf
#
# 设计原则同本仓库其它配置：宁可漏拦，不可误伤。
#   - 明确的广告接口 / 开屏图片：静态拦截（reject 系列）；
#   - 结构可能混入正文的快讯 / 资讯流：走脚本，只删「被标记为广告」的条目；
#   - 未知结构或解析失败：脚本原样返回，绝不破坏 App。
#
# 说明：本配置以金十已知域名与常见广告路径为基础（启发式，非逐条抓包实锤，
#       与 ths_ad.conf 的「抓包实锤」不同）。若有开屏/弹窗残留，抓包把对应
#       URL 发来即可精准补规则。
#
# 使用：QuantumultX -> 重写 -> 引用本文件 raw 链接，开启 MITM 并信任证书
# https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/rewrite/jin10_ad.conf

hostname = *.jin10.com, *.jin10.net, api.jin10.com, flash-api.jin10.com, cdn.jin10.com, static.jin10.com

# ========== 一、开屏 / 启动广告（直接拦截） ==========

# 开屏广告配置接口（splash / launch / boot / startup 等命名兜底）
^https?:\/\/[\w.-]*\.jin10\.(com|net)\/.*\/(splash|launch|boot|startup|open_?screen|kaiping)(_ad|_config|_advert)? url reject-dict

# 开屏 / 启动广告图片素材
^https?:\/\/(cdn|static|image|img)\.jin10\.(com|net)\/.*(splash|kaiping|launch|open_?screen)\/ url reject-img

# ========== 二、通用广告接口（拦截） ==========

# 广告物料 / 推荐 / 位置接口（ad / adv / advert / advertisement）
^https?:\/\/[\w.-]*\.jin10\.(com|net)\/.*\/(ads?|adv|advert|advertise(ment)?|adconfig|ad_list|adlist|banner)(\/|\?|$) url reject-dict

# 弹窗 / 运营位广告（popup / dialog / operate / marketing）
^https?:\/\/[\w.-]*\.jin10\.(com|net)\/.*\/(popup|dialog|operate|operation|marketing|promotion)(_ad|_list)?(\/|\?|$) url reject-dict

# ========== 三、行为追踪 / 遥测上报（可选，省电省流量） ==========

# 埋点 / 统计 / 日志上报（仅上报，不影响功能）
^https?:\/\/[\w.-]*\.jin10\.(com|net)\/.*\/(track|report|collect|analytics|stat|statistic|log)(\/|\?|$) url reject-200

# ========== 四、脚本净化：快讯 / 资讯流内嵌广告 ==========
# （金十快讯与资讯流可能内嵌营销条目，交给脚本按「广告标记字段」剔除，不猜关键词）

^https?:\/\/(flash-api|api)\.jin10\.(com|net)\/.*\/(flash|news|feed|list|index|home) url script-response-body https://raw.githubusercontent.com/KimpoHung/Hello-QuantumultX/main/scripts/jin10_purify.js

# ========== 复核说明 ==========
# 脚本对未知结构原样返回，只清空广告容器字段并删除带广告标记的条目，
# 不会破坏正常快讯/行情内容。若仍有残留，抓包补规则即可。
